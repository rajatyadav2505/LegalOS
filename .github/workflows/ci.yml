name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Create venv and install API dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -e 'apps/api[dev]'

      - name: Install JS workspace dependencies
        run: corepack pnpm install

      - name: Lint
        run: make lint

      - name: Tests
        run: make test

      - name: Build web bundle
        run: make build-web
