name: legalos

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legalos}
      POSTGRES_USER: ${POSTGRES_USER:-legalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalos}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalos} -d ${POSTGRES_DB:-legalos}"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:7.2-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-legalos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-legalos123}
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  tika:
    image: apache/tika:2.9.2.1
    ports:
      - "${TIKA_PORT:-9998}:9998"

volumes:
  postgres-data:
  valkey-data:
  minio-data:
